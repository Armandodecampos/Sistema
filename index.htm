<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Segurança - Tente se puder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            position: absolute;
            /* Transição suave para evitar tremores bruscos */
            transition: left 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), 
                        top 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            user-select: none;
            z-index: 10;
        }
        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid #334155;
            color: white;
            transition: border-color 0.2s;
        }
        .input-field:focus {
            border-color: #38bdf8;
            outline: none;
        }
        #secret-access {
            position: fixed;
            bottom: 20px;
            right: 20px;
            color: white;
            opacity: 0.1;
            text-decoration: none;
            cursor: pointer;
            transition: opacity 0.3s, font-size 0.2s ease;
            white-space: nowrap;
        }
        #secret-access:hover {
            opacity: 1;
            text-decoration: underline;
        }
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="loginCard" class="glass-card">
        <div class="mb-6 flex justify-center">
            <div class="p-4 bg-yellow-500/20 rounded-full">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 text-yellow-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>
        </div>
        
        <h2 class="text-2xl font-bold mb-6 text-white">Tente digitar a senha...</h2>
        
        <div id="input-container">
            <input type="password" id="passwordInput" placeholder="Senha aqui..." class="input-field w-full p-4 rounded-xl mb-4 text-center text-lg">
            <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition duration-200 transform active:scale-95">
                Entrar
            </button>
        </div>
        <p id="errorMessage" class="text-red-400 mt-4 text-sm hidden">Senha incorreta.</p>
    </div>

    <!-- Link que cresce progressivamente -->
    <a id="secret-access" class="hidden" href="https://armandodecampos.github.io/Relat-rio-de-pessoas-por-departamentos/">
        Acesse aqui
    </a>

    <script>
        const card = document.getElementById('loginCard');
        const inputField = document.getElementById('passwordInput');
        const errorMessage = document.getElementById('errorMessage');
        const secretLink = document.getElementById('secret-access');

        let dodgeCount = 0; 

        document.addEventListener('mousemove', (e) => {
            const mouseX = e.clientX;
            const mouseY = e.clientY;
            
            const cardRect = card.getBoundingClientRect();
            const cardCenterX = cardRect.left + cardRect.width / 2;
            const cardCenterY = cardRect.top + cardRect.height / 2;

            const distance = Math.hypot(mouseX - cardCenterX, mouseY - cardCenterY);

            if (distance < 180) {
                moveCardRandomly(mouseX, mouseY);
                
                dodgeCount++;
                
                // Lógica de crescimento do texto
                if (dodgeCount >= 1) {
                    secretLink.classList.remove('hidden');
                    // Começa em 2px e aumenta 2px a cada tentativa
                    // (2px é o mínimo para ser minimamente renderizado, mas 1px também funciona)
                    const newSize = 2 + (dodgeCount * 1.5); 
                    secretLink.style.fontSize = `${newSize}px`;
                }
            }
        });

        function moveCardRandomly(mX, mY) {
            const cardWidth = card.offsetWidth;
            const cardHeight = card.offsetHeight;
            
            let newX, newY, distToMouse;

            for(let i = 0; i < 10; i++) {
                newX = Math.random() * (window.innerWidth - cardWidth) + cardWidth / 2;
                newY = Math.random() * (window.innerHeight - cardHeight) + cardHeight / 2;
                
                distToMouse = Math.hypot(mX - newX, mY - newY);
                if (distToMouse > 300) break;
            }

            card.style.left = `${newX}px`;
            card.style.top = `${newY}px`;
        }

        function handleLogin() {
            const password = inputField.value;
            if (password === "sua senha") {
                window.location.href = "https://armandodecampos.github.io/Relat-rio-de-pessoas-por-departamentos/";
            } else {
                errorMessage.classList.remove('hidden');
                inputField.value = "";
                inputField.focus();
            }
        }

        inputField.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
